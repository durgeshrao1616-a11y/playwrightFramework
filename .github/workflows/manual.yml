name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwrightFramework
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 18   # ✅ Pin to same version across jobs

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run API tests
        run: npx playwright test tests/api --reporter=dot

      - name: Upload API test results
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: playwrightFramework/test-results


  ui-tests:
    runs-on: ubuntu-latest
    needs: api-tests   # ✅ UI tests only run if API tests succeed
    defaults:
      run:
        working-directory: playwrightFramework
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers   # ✅ Added here
        run: npx playwright install --with-deps

      - name: Run UI tests with Allure reporter
        run: npx playwright test tests/web/FileUploadDownload.spec.ts --reporter=allure-playwright

      - name: Generate Allure report
        run: npx allure generate playwrightFramework/allure-results --clean -o playwrightFramework/allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: playwrightFramework/allure-report
